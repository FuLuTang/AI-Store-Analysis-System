<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福州门店 AI 分析系统</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" class="active">用户工作台</a>
            <a href="monitor.html">后台监控流</a>
            <a href="admin.html">管理员配置</a>
            <div class="nav-right">
                <select id="reasoningEffortSelect" class="nav-select">
                    <option value="medium">medium（默认）</option>
                    <option value="low">low（快速）</option>
                    <option value="high">high（深度）</option>
                </select>
                <button class="nav-btn danger" onclick="localStorage.removeItem('X-FZT-Key'); window.location.href='/login.html';">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </nav>

        <header>
            <h1>药店经营 AI 智能诊断</h1>
            <p class="subtitle">拖入门店经营 JSON 数据，一键获取深度归因与优化策略。</p>
        </header>

        <div class="card">
            <div id="dropZone" class="drop-zone">
                <i class="fas fa-file-upload"></i>
                <p id="fileName">拖放文件到此处（支持 Excel / CSV / JSON / PDF / Word / 文本 / 压缩包）</p>
                <div id="fileList" class="file-list"></div>
                <input type="file" id="fileInput" hidden multiple accept=".json,.xlsx,.xls,.csv,.pdf,.docx,.doc,.txt,.md,.zip,.rar,.7z">
            </div>

            <details class="analysis-params-details" id="paramsDetails">
                <summary>
                    <i class="fas fa-sliders-h"></i> 分析参数（可选）
                </summary>
                <div class="params-body">
                    <div id="paramsFormContainer"></div>
                    <div class="param-actions">
                        <select id="presetSelect" style="background:#f1f5f9;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:0.85rem;cursor:pointer;">
                            <option value="">📋 预设...</option>
                        </select>
                        <button id="addParamBtn" class="btn-secondary btn-sm">
                            <i class="fas fa-plus"></i> 添加参数
                        </button>
                        <button id="saveParamsBtn" class="btn btn-sm">
                            <i class="fas fa-save"></i> 保存
                        </button>
                        <span id="paramsSavedHint" class="saved-hint">✓ 已保存</span>
                    </div>
                </div>
            </details>

            <!-- 参数编辑弹窗 -->
            <div id="paramEditorModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;">
                <div style="background:#fff;border-radius:var(--radius);padding:2rem;max-width:440px;width:90%;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;">
                    <h3 style="margin-bottom:1.25rem;font-size:1.15rem;"><i class="fas fa-plus-circle"></i> 新建参数</h3>
                    <div class="form-group">
                        <label>控件类型</label>
                        <select id="peType" class="form-select" onchange="window.updateParamEditor()">
                            <option value="text">文本</option>
                            <option value="number">数字</option>
                            <option value="toggle">开关</option>
                            <option value="slider">滑块</option>
                            <option value="select">下拉选择</option>
                            <option value="date">日期选择</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>参数名称</label>
                        <input id="peKey" class="form-input" placeholder="例如：分析时间颗粒度">
                    </div>
                    <div class="form-group" id="peValueGroup">
                        <label id="peValueLabel">默认值</label>
                        <div id="peValueInner"></div>
                    </div>
                    <div id="peExtras"></div>
                    <div class="modal-actions">
                        <button class="btn-secondary" onclick="window.closeParamEditor()">取消</button>
                        <button class="btn" onclick="window.confirmAddParam()"><i class="fas fa-check"></i> 确认添加</button>
                    </div>
                </div>
            </div>

            <div class="action-bar">
                <button id="exampleBtn" class="btn-secondary">
                    <i class="fas fa-vial"></i> 使用案例 JSON 文件
                </button>
                <button id="startBtn" class="btn" disabled>
                    <i class="fas fa-magic"></i> 开始多维 AI 诊断
                </button>
                <button id="stopBtn" class="btn-danger" hidden>
                    <i class="fas fa-stop-circle"></i> 强制停止
                </button>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <span id="statusText">任务正在后台运行，请等待...</span>
            </div>

            <div class="report-toggle" id="reportToggleBar">
                <span id="labelSimple">精简</span>
                <label class="switch">
                    <input type="checkbox" id="reportToggle">
                    <span class="slider round"></span>
                </label>
                <span id="labelFull">完整</span>
            </div>

            <div id="result" class="report-section">
                <div class="report-card">
                    <div id="reportContent" class="markdown-body"></div>
                </div>
            </div>

            <!-- 底部日志与进度 -->
            <div class="progress-section" id="progressContainer">
                <div class="progress-header">
                    <span class="progress-header-title"><i class="fas fa-tasks"></i> 系统处理进度 <span class="progress-header-hint">(预计 3-5 分钟)</span></span>
                    <span class="progress-text" id="progressText">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div id="currentStepText" style="margin-top:0.5rem;font-size:0.85rem;color:#6366f1;font-weight:500;min-height:1.2em;transition:opacity 0.2s;"></div>
            </div>

            <div class="log-container" id="globalLogContainer">
                <div class="log-header">
                    <span><i class="fas fa-terminal"></i> 总后台运行日志</span>
                    <a href="monitor.html" target="_blank"><i class="fas fa-external-link-alt"></i> 详细监控视图</a>
                </div>
                <div id="globalLogContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== 鉴权守卫 ==========
        function authHeaders() {
            const key = localStorage.getItem('X-FZT-Key') || '';
            return { 'X-FZT-Key': key };
        }

        (async function authGuard() {
            const key = localStorage.getItem('X-FZT-Key');
            if (!key) { window.location.href = '/login.html'; return; }
            try {
                const r = await fetch('/api/auth/verify', { method: 'POST', headers: { 'X-FZT-Key': key } });
                if (!r.ok) { localStorage.removeItem('X-FZT-Key'); window.location.href = '/login.html'; }
            } catch(e) { window.location.href = '/login.html'; }
        })();

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fileListDisplay = document.getElementById('fileList');
        const loading = document.getElementById('loading');
        const statusText = document.getElementById('statusText');
        const globalLogContainer = document.getElementById('globalLogContainer');
        const globalLogContent = document.getElementById('globalLogContent');
        const resultSection = document.getElementById('result');
        const reportToggle = document.getElementById('reportToggle');
        const labelSimple = document.getElementById('labelSimple');
        const labelFull = document.getElementById('labelFull');
        const exampleBtn = document.getElementById('exampleBtn');
        
        let filesData = [];
        let currentReport = null;
        let currentFullReport = null;
        let pollingInterval = null;
        let sseSource = null;
        
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const currentStepText = document.getElementById('currentStepText');

        let currentProgress = 0;

        function setProgress(pct) {
            if (pct > currentProgress) {
                currentProgress = pct;
                if (currentProgress > 100) currentProgress = 100;
                progressBar.style.width = currentProgress + '%';
                progressText.innerText = currentProgress + '%';
            }
        }

        function resetProgressState() {
            currentProgress = 0;
            progressBar.style.width = '0%';
            progressText.innerText = '0%';
            currentStepText.innerText = '';
        }

        function connectSSE() {
            if (sseSource) return;
            sseSource = new EventSource('/api/stream?x-fzt-key=' + encodeURIComponent(localStorage.getItem('X-FZT-Key') || ''));
            sseSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'log') {
                    const level = data.level || 'info';

                    // 读取 progress 字段，直接设进度条
                    if (data.progress !== undefined && data.progress !== null) {
                        setProgress(Math.round(data.progress));
                    }

                    // debug 级别：完全过滤
                    if (level === 'debug') return;

                    // status 级别：更新常驻"当前进度"文字（不追加日志行）
                    if (level === 'status') {
                        currentStepText.innerText = data.message || '';
                        return;
                    }

                    // info / error 级别：追加到日志列表
                    const div = document.createElement('div');
                    div.style.marginBottom = '2px';
                    if (level === 'error') {
                        div.style.color = '#ef4444';
                        div.style.fontWeight = '600';
                    }
                    div.innerText = `[${data.time}] ${data.message}`;
                    globalLogContent.appendChild(div);
                    globalLogContainer.scrollTop = globalLogContainer.scrollHeight;
                } else if (data.type === 'reset') {
                    globalLogContent.innerHTML = '';
                    resetProgressState();
                }
            };
        }

        function disconnectSSE() {
            if (sseSource) {
                sseSource.close();
                sseSource = null;
            }
        }

        window.onload = async () => {
            await checkStatus();
        };

        async function checkStatus() {
            try {
                const res = await fetch('/api/status', { headers: authHeaders() });
                const data = await res.json();

                // ── 第一段：状态 UI（spinner / 按钮 / polling） ──
                const isTerminal = data.status !== 'running' && data.status !== 'queued';

                if (data.status === 'running' || data.status === 'queued') {
                    startBtn.disabled = true;
                    stopBtn.style.display = 'inline-flex';
                    loading.style.display = 'flex';
                    statusText.innerText = '任务正在后台运行，请等待...';
                    progressContainer.style.display = 'block';
                    globalLogContainer.style.display = 'block';
                    connectSSE();
                    if (!pollingInterval) {
                        pollingInterval = setInterval(checkStatus, 2000);
                    }
                } else {
                    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
                    startBtn.disabled = filesData.length === 0;
                    stopBtn.style.display = 'none';
                    loading.style.display = 'none';
                    if (data.status === 'completed') {
                        if (!sseSource) connectSSE(); // 回放历史日志
                        progressContainer.style.display = 'block';
                        globalLogContainer.style.display = 'block';
                    } else if (data.status === 'error' || data.status === 'aborted') {
                        disconnectSSE();
                        progressContainer.style.display = 'block';
                        globalLogContainer.style.display = 'block';
                    }
                    // idle: 不展示进度/日志区域
                }

                // ── 第二段：结果渲染（完全独立于 status） ──
                // 只要 API 回传了结果内容（无论 status 是什么），就渲染
                if (data.result && data.fullResult) {
                    // 清除上次的警告 banner（如果有）
                    const oldBanner = document.getElementById('pipelineWarnBanner');
                    if (oldBanner) oldBanner.remove();

                    currentReport = data.result;
                    currentFullReport = data.fullResult;
                    renderReport();
                    resultSection.classList.add('visible');
                } else if (isTerminal && data.status !== 'idle' && data.status !== 'completed') {
                    // 终止且没有结果内容，且之前也没有结果 → 弹提示
                    if (data.errorMessage && data.errorMessage.length > 0 && currentReport == null) {
                        alert('运行结束: ' + (data.errorMessage || data.status));
                    }
                }

            } catch (e) {
                console.error("Status fetch error", e);
            }
        }


        reportToggle.addEventListener('change', () => {
            if (reportToggle.checked) {
                labelSimple.style.fontWeight = 'normal';
                labelFull.style.fontWeight = 'bold';
            } else {
                labelSimple.style.fontWeight = 'bold';
                labelFull.style.fontWeight = 'normal';
            }
            renderReport();
        });

        function renderReport() {
            if (currentReport === null || currentFullReport === null) return;
            
            const isFull = reportToggle.checked;
            const rep = isFull ? currentFullReport : currentReport;
            
            const contentDiv = document.getElementById('reportContent');
            const cardDiv = contentDiv.closest('.report-card');
            
            if (!rep || rep.trim() === '') {
                cardDiv.style.display = 'none';
                return;
            }
            
            cardDiv.style.display = 'block';

            if (isFull) {
                // 完整报告直接用 markdown 渲染
                contentDiv.innerHTML = marked.parse(rep);
                contentDiv.className = 'markdown-body';
            } else {
                // 精简报告（JSON 卡片化）
                try {
                    let jsonStr = rep;
                    if (jsonStr.startsWith('```json')) {
                        jsonStr = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                    } else if (jsonStr.startsWith('```')) {
                        jsonStr = jsonStr.replace(/```/g, '').trim();
                    }
                    
                    const data = JSON.parse(jsonStr);
                    
                    // 构建大卡片（概览）
                    const overviewHtml = `
                        <div class="dashboard-overview">
                            <h2>
                                <i class="fas fa-heartbeat"></i> 经营状态：${data.health_status || '未知'}
                            </h2>
                            <p>${data.overview_text || '暂无概览信息'}</p>
                        </div>
                    `;

                    // 构建小卡片（瀑布流/网格）
                    let cardsHtml = '';
                    if (data.cards && data.cards.length > 0) {
                        const cardsList = data.cards.map(c => {
                            let icon = 'fa-info-circle';
                            let iconColor = 'var(--primary)';
                            if (c.color === 'red') { icon = 'fa-exclamation-triangle'; iconColor = 'var(--error)'; }
                            if (c.color === 'yellow') { icon = 'fa-bolt'; iconColor = '#f59e0b'; }
                            if (c.color === 'green') { icon = 'fa-check-circle'; iconColor = 'var(--success)'; }
                            if (c.color === 'pink') { icon = 'fa-question-circle'; iconColor = '#ff6b9d'; }

                            return `
                                <div class="issue-card" data-color="${c.color || 'blue'}">
                                    <div class="issue-title">
                                        <i class="fas ${icon}" style="color: ${iconColor};"></i>
                                        ${c.title}
                                    </div>
                                    <div class="issue-explanation">${c.explanation}</div>
                                    <div class="issue-suggestion">
                                        <i class="fas fa-lightbulb"></i>
                                        <span>${c.suggestion}</span>
                                    </div>
                                    <div class="evidence-wrapper">
                                        <i class="fas fa-chart-line evidence-icon"></i>
                                        <div class="evidence-tooltip markdown-body">${marked.parse(c.evidence || '')}</div>
                                    </div>
                                </div>
                            `;
                        }).join('');
                        cardsHtml = `<div class="masonry-grid">${cardsList}</div>`;
                    }

                    contentDiv.className = ''; // 移除 markdown-body 样式
                    contentDiv.innerHTML = overviewHtml + cardsHtml;

                } catch (e) {
                    console.error("JSON 解析失败:", e);
                    // 降级处理
                    contentDiv.className = 'markdown-body';
                    contentDiv.innerHTML = `<h3><i class="fas fa-exclamation-triangle" style="color:orange;"></i> 数据解析异常</h3><p>AI 返回的格式不符合预期，以下为原始内容：</p><br>` + marked.parse(rep);
                }
            }
        }

        // === 文件上传 ===
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        };

        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        };

        const ALLOWED_EXTENSIONS = ['.json', '.xlsx', '.xls', '.csv', '.pdf', '.docx', '.doc', '.txt', '.md', '.zip', '.rar', '.7z'];
        function handleFiles(files) {
            if (files.length === 0) return;

            filesData = [];
            fileListDisplay.innerHTML = '';

            Array.from(files).forEach(file => {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!ALLOWED_EXTENSIONS.includes(ext)) {
                    alert(`不支持的文件: ${file.name}\n支持的格式: ${ALLOWED_EXTENSIONS.join(', ')}`);
                    return;
                }
                filesData.push(file);

                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `<i class="fas fa-file-code"></i> ${file.name}`;
                fileListDisplay.appendChild(item);
            });

            startBtn.disabled = false;
            document.getElementById('fileName').innerText = `已准备 ${filesData.length} 个数据文件`;
        }

        // === 开始分析 ===
        startBtn.onclick = async () => {
            if (filesData.length === 0) return;

            // 自动保存当前分析参数
            const cleanedParams = collectParamsData();
            try {
                await fetch('/api/analysis-params', {
                    method: 'PUT',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ analysis_params: cleanedParams }),
                });
            } catch (e) { /* 静默失败 */ }

            const reasoningEffort = document.getElementById('reasoningEffortSelect').value || 'medium';

            startBtn.disabled = true;
            stopBtn.style.display = 'inline-flex';
            loading.style.display = 'flex';
            resetProgressState();
            progressContainer.style.display = 'block';
            globalLogContainer.style.display = 'block';
            connectSSE();
            resultSection.classList.remove('visible');
            statusText.innerText = '正在提交分析任务...';

            try {
                const formData = new FormData();
                filesData.forEach(file => formData.append('files', file));
                formData.append('reasoningEffort', reasoningEffort);

                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: formData
                });

                const data = await response.json();
                
                if (data.status === 'started' || data.status === 'success') {
                    if (!pollingInterval) {
                        pollingInterval = setInterval(checkStatus, 2000);
                    }
                } else {
                    throw new Error(data.detail || data.error || '启动失败');
                }
            } catch (err) {
                alert('分析出错: ' + err.message);
                loading.style.display = 'none';
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
            }
        };

        stopBtn.onclick = async () => {
            if (!confirm('确认要强制停止当前正在运行的后台分析任务吗？')) return;
            try {
                await fetch('/api/stop', { method: 'POST', headers: authHeaders() });
                await checkStatus();
            } catch(e) {
                console.error(e);
            }
        };

        exampleBtn.onclick = async () => {
            try {
                exampleBtn.disabled = true;
                const res = await fetch('/api/examples');
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                filesData = [];
                fileListDisplay.innerHTML = '';
                data.files.forEach((f) => {
                    const byteStr = atob(f.base64);
                    const bytes = new Uint8Array(byteStr.length);
                    for (let i = 0; i < byteStr.length; i++) bytes[i] = byteStr.charCodeAt(i);
                    const file = new File([bytes], f.name, { type: 'application/octet-stream' });
                    filesData.push(file);

                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `<i class="fas fa-file-code"></i> ${f.name || '案例文件'}`;
                    fileListDisplay.appendChild(item);
                });

                startBtn.disabled = false;
                document.getElementById('fileName').innerText = `已加载 ${filesData.length} 个案例文件`;
            } catch (err) {
                alert('加载案例失败: ' + err.message);
            } finally {
                exampleBtn.disabled = false;
            }
        };

        // ========== 分析参数 ==========
        let paramsData = [];
        let presetsMap = {};
        const paramsContainer = document.getElementById('paramsFormContainer');
        const saveParamsBtn = document.getElementById('saveParamsBtn');
        const paramsSavedHint = document.getElementById('paramsSavedHint');
        const addParamBtn = document.getElementById('addParamBtn');
        const presetSelect = document.getElementById('presetSelect');

        function detectControlType(item) {
            if (item.options && Array.isArray(item.options) && item.options.length) return 'select';
            if (typeof item.value === 'boolean') return 'toggle';
            if (typeof item.value === 'number') {
                if (item.step !== undefined) return 'slider';
                if (item.min !== undefined && item.max !== undefined) return 'slider';
                return 'number';
            }
            if (typeof item.value === 'string' && /^\d{4}[-/]\d{1,2}[-/]\d{1,2}$/.test(item.value)) return 'date';
            return 'text';
        }

        function renderParamsForm(data) {
            if (!Array.isArray(data)) {
                paramsContainer.innerHTML = '<div style="color:#94a3b8;font-size:0.85rem;">暂无参数</div>';
                return;
            }
            paramsData = data;
            let html = '';
            data.forEach((item, i) => {
                if (typeof item !== 'object' || item === null) return;
                const key = item.key || '';
                const value = item.value;
                const ctrlType = detectControlType(item);
                const options = item.options || [];
                const minVal = item.min !== undefined ? item.min : (ctrlType === 'slider' ? 0 : undefined);
                const maxVal = item.max !== undefined ? item.max : (ctrlType === 'slider' ? 1 : undefined);
                const stepVal = ctrlType === 'slider' ? 0.01 : undefined;

                let ctrlHtml = '';
                if (ctrlType === 'select') {
                    const opts = options.map(o => `<option value="${o.replace(/"/g,'&quot;')}" ${value === o ? 'selected' : ''}>${o}</option>`).join('');
                    ctrlHtml = `<select class="param-select" data-idx="${i}" style="padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:0.85rem;background:#fff;">${opts}</select>`;
                } else if (ctrlType === 'toggle') {
                    const on = value === true;
                    ctrlHtml = `<label class="param-toggle" data-idx="${i}" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;">
                        <input type="checkbox" ${on ? 'checked' : ''} style="display:none;">
                        <span style="position:relative;display:inline-block;width:40px;height:22px;background:${on ? 'var(--success)' : '#e2e8f0'};border-radius:11px;transition:.2s;">
                            <span style="position:absolute;top:2px;left:${on ? '20px' : '2px'};width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);"></span>
                        </span>
                        <span style="font-size:0.8rem;color:${on ? 'var(--success)' : '#94a3b8'};">${on ? 'ON' : 'OFF'}</span>
                    </label>`;
                } else if (ctrlType === 'slider') {
                    const pct = typeof value === 'number' ? Math.round(value / (maxVal || 1) * 100) : 0;
                    ctrlHtml = `<div style="display:inline-flex;align-items:center;gap:6px;">
                        <input type="range" class="param-slider" data-idx="${i}" min="${minVal}" max="${maxVal}" step="${stepVal}" value="${value}" style="width:100px;">
                        <span class="param-slider-val" style="font-size:0.8rem;color:var(--text-muted);min-width:32px;">${pct}%</span>
                    </div>`;
                } else if (ctrlType === 'number') {
                    ctrlHtml = `<input type="number" class="param-number" data-idx="${i}" value="${value}" ${minVal !== undefined ? `min="${minVal}"` : ''} ${maxVal !== undefined ? `max="${maxVal}"` : ''} style="width:80px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:0.85rem;">`;
                } else if (ctrlType === 'date') {
                    ctrlHtml = `<input type="date" class="param-date" data-idx="${i}" value="${value || ''}" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:0.85rem;">`;
                } else {
                    ctrlHtml = `<input type="text" class="param-text" data-idx="${i}" value="${String(value !== undefined && value !== null ? value : '').replace(/"/g,'&quot;')}" placeholder="输入值" style="width:160px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:0.85rem;">`;
                }

                html += `<div class="param-row" data-idx="${i}" style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:4px 0;">
                    <input type="text" class="param-key" data-idx="${i}" value="${key.replace(/"/g,'&quot;')}" placeholder="参数名" style="width:120px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:0.85rem;background:#fafafa;">
                    ${ctrlHtml}
                    <button class="param-del" data-idx="${i}" style="border:none;background:none;cursor:pointer;color:#ef4444;font-size:1rem;padding:2px;" title="删除">✕</button>
                </div>`;
            });
            if (!html) {
                paramsContainer.innerHTML = '<div style="color:#94a3b8;font-size:0.85rem;">暂无参数，点击"添加参数"新建</div>';
            } else {
                paramsContainer.innerHTML = html;
            }
            bindParamEvents();
        }

        function bindParamEvents() {
            // 删除
            document.querySelectorAll('.param-del').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    paramsData.splice(idx, 1);
                    renderParamsForm(paramsData);
                };
            });
            // key 输入
            document.querySelectorAll('.param-key').forEach(inp => {
                inp.oninput = () => {
                    const idx = parseInt(inp.dataset.idx);
                    if (paramsData[idx]) paramsData[idx].key = inp.value;
                };
            });
            // text 输入
            document.querySelectorAll('.param-text').forEach(inp => {
                inp.oninput = () => {
                    const idx = parseInt(inp.dataset.idx);
                    if (paramsData[idx]) paramsData[idx].value = inp.value;
                };
            });
            // select
            document.querySelectorAll('.param-select').forEach(sel => {
                sel.onchange = () => {
                    const idx = parseInt(sel.dataset.idx);
                    if (paramsData[idx]) paramsData[idx].value = sel.value;
                };
            });
            // toggle
            document.querySelectorAll('.param-toggle input[type=checkbox]').forEach(cb => {
                cb.onchange = () => {
                    const idx = parseInt(cb.closest('.param-toggle').dataset.idx);
                    if (paramsData[idx]) paramsData[idx].value = cb.checked;
                    // 刷新 UI 颜色
                    const label = cb.closest('.param-toggle');
                    const bg = label.querySelector('span:first-of-type');
                    const dot = bg.querySelector('span');
                    const txt = label.querySelector('span:last-of-type');
                    bg.style.background = cb.checked ? 'var(--success)' : '#e2e8f0';
                    dot.style.left = cb.checked ? '20px' : '2px';
                    txt.textContent = cb.checked ? 'ON' : 'OFF';
                    txt.style.color = cb.checked ? 'var(--success)' : '#94a3b8';
                };
            });
            // slider
            document.querySelectorAll('.param-slider').forEach(sl => {
                sl.oninput = () => {
                    const idx = parseInt(sl.dataset.idx);
                    const val = parseFloat(sl.value);
                    if (paramsData[idx]) paramsData[idx].value = val;
                    const pct = Math.round(val / parseFloat(sl.max || 1) * 100);
                    sl.parentNode.querySelector('.param-slider-val').textContent = pct + '%';
                };
            });
            // number input change
            document.querySelectorAll('.param-number').forEach(inp => {
                inp.oninput = () => {
                    const idx = parseInt(inp.dataset.idx);
                    const val = inp.value === '' ? '' : parseFloat(inp.value);
                    if (paramsData[idx]) paramsData[idx].value = val;
                };
            });
            // date 输入
            document.querySelectorAll('.param-date').forEach(inp => {
                inp.oninput = () => {
                    const idx = parseInt(inp.dataset.idx);
                    if (paramsData[idx]) paramsData[idx].value = inp.value || '';
                };
            });
        }

        function collectParamsData() {
            // 收集 + 清理：移除空 key 的行，去掉 UI 冗余字段
            return paramsData.filter(item => item && item.key && item.key.trim() !== '').map(item => {
                const { type, ...rest } = item;
                return rest;
            });
        }

        async function loadAnalysisParams() {
            try {
                const res = await fetch('/api/analysis-params', { headers: authHeaders() });
                const data = await res.json();
                const raw = data.analysis_params;
                if (Array.isArray(raw)) {
                    paramsData = raw;
                } else if (raw && typeof raw === 'string') {
                    // 尝试解析为对象（旧格式）
                    try {
                        const obj = JSON.parse(raw);
                        if (typeof obj === 'object' && obj !== null && !Array.isArray(obj)) {
                            paramsData = Object.entries(obj).map(([k, v]) => ({key: k, value: v}));
                        } else {
                            paramsData = [{key: '分析参数', value: raw}];
                        }
                    } catch {
                        paramsData = [{key: '分析参数', value: raw}];
                    }
                } else {
                    paramsData = [];
                }
                renderParamsForm(paramsData);
            } catch (e) {
                paramsData = [];
                renderParamsForm(paramsData);
            }
        }
        loadAnalysisParams();

        // 加载预设列表
        async function loadPresets() {
            try {
                const res = await fetch('/api/analysis-params/presets', { headers: authHeaders() });
                const data = await res.json();
                presetsMap = data.presets || {};
                const names = Object.keys(presetsMap);
                presetSelect.innerHTML = '<option value="">📋 预设...</option>';
                names.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    presetSelect.appendChild(opt);
                });
            } catch (e) {
                // ignore
            }
        }
        loadPresets();

        presetSelect.onchange = () => {
            const name = presetSelect.value;
            if (!name || !presetsMap[name]) return;
            if (paramsData.length > 0 && !confirm(`"${name}" 将替换当前所有参数，确认？`)) {
                presetSelect.value = '';
                return;
            }
            const preset = presetsMap[name];
            // 新格式: {reasoning_effort, params} / 旧格式: [...] 数组
            if (Array.isArray(preset)) {
                paramsData = JSON.parse(JSON.stringify(preset));
            } else {
                if (preset.reasoning_effort) {
                    document.getElementById('reasoningEffortSelect').value = preset.reasoning_effort;
                }
                paramsData = JSON.parse(JSON.stringify(preset.params || []));
            }
            renderParamsForm(paramsData);
            presetSelect.value = '';
        };

        saveParamsBtn.onclick = async () => {
            try {
                saveParamsBtn.disabled = true;
                paramsSavedHint.style.display = 'none';
                const cleaned = collectParamsData();
                await fetch('/api/analysis-params', {
                    method: 'PUT',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ analysis_params: cleaned }),
                });
                paramsData = cleaned;
                renderParamsForm(cleaned);
                paramsSavedHint.style.display = 'inline';
                setTimeout(() => { paramsSavedHint.style.display = 'none'; }, 2000);
            } catch (e) {
                alert('保存失败: ' + e.message);
            } finally {
                saveParamsBtn.disabled = false;
            }
        };

        addParamBtn.onclick = () => openParamEditor();

        // ========== 参数编辑弹窗 ==========
        function openParamEditor() {
            document.getElementById('paramEditorModal').style.display = 'flex';
            document.getElementById('peKey').value = '';
            updateParamEditor();
        }

        function closeParamEditor() {
            document.getElementById('paramEditorModal').style.display = 'none';
        }

        function updateParamEditor() {
            const type = document.getElementById('peType').value;
            const inner = document.getElementById('peValueInner');
            const extras = document.getElementById('peExtras');
            extras.innerHTML = '';

            if (type === 'toggle') {
                inner.innerHTML = `<label class="param-toggle" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="peValue" checked style="display:none;">
                    <span style="position:relative;display:inline-block;width:40px;height:22px;background:var(--success);border-radius:11px;transition:.2s;">
                        <span style="position:absolute;top:2px;left:20px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);"></span>
                    </span>
                    <span style="font-size:0.8rem;color:var(--success);" id="peToggleLabel">ON</span>
                </label>`;
                const cb = inner.querySelector('input');
                cb.onchange = () => {
                    const bg = cb.closest('label').querySelector('span:first-of-type');
                    const dot = bg.querySelector('span');
                    const txt = document.getElementById('peToggleLabel');
                    bg.style.background = cb.checked ? 'var(--success)' : '#e2e8f0';
                    dot.style.left = cb.checked ? '20px' : '2px';
                    txt.textContent = cb.checked ? 'ON' : 'OFF';
                    txt.style.color = cb.checked ? 'var(--success)' : '#94a3b8';
                };
            } else if (type === 'select') {
                inner.innerHTML = `<input id="peValue" class="form-input" placeholder="例如：选项A">`;
                extras.innerHTML = `<div class="form-group"><label>选项列表（每行一个）</label><textarea id="peOptions" class="form-input" rows="4" placeholder="选项A\n选项B\n选项C" style="resize:vertical;"></textarea></div>`;
            } else if (type === 'slider') {
                inner.innerHTML = `<input id="peValue" type="number" class="form-input" step="0.01" min="0" max="1" value="0.5" placeholder="0.5">`;
                extras.innerHTML = `<div style="display:flex;gap:1rem;"><div class="form-group" style="flex:1;"><label>最小值</label><input id="peMin" type="number" class="form-input" step="0.01" value="0"></div><div class="form-group" style="flex:1;"><label>最大值</label><input id="peMax" type="number" class="form-input" step="0.01" value="1"></div></div>`;
            } else if (type === 'number') {
                inner.innerHTML = `<input id="peValue" type="number" class="form-input" value="0" placeholder="0">`;
            } else if (type === 'date') {
                inner.innerHTML = `<input id="peValue" type="date" class="form-input" value="">`;
            } else {
                inner.innerHTML = `<input id="peValue" class="form-input" placeholder="输入默认值">`;
            }
        }

        function confirmAddParam() {
            const type = document.getElementById('peType').value;
            const key = document.getElementById('peKey').value.trim();
            if (!key) { alert('请输入参数名称'); return; }

            let value, extra = {};
            if (type === 'toggle') {
                value = document.querySelector('#peValueInner input[type=checkbox]').checked;
            } else if (type === 'select') {
                value = document.getElementById('peValue').value;
                const opts = document.getElementById('peOptions').value.split('\n').map(s => s.trim()).filter(Boolean);
                if (opts.length) extra.options = opts;
            } else if (type === 'slider') {
                value = parseFloat(document.getElementById('peValue').value) || 0.5;
                extra.min = parseFloat(document.getElementById('peMin').value) || 0;
                extra.max = parseFloat(document.getElementById('peMax').value) || 1;
            } else if (type === 'number') {
                value = parseFloat(document.getElementById('peValue').value) || 0;
            } else if (type === 'date') {
                value = document.getElementById('peValue').value || '';
            } else {
                value = document.getElementById('peValue').value || '';
            }

            paramsData.push({ key, value, ...extra });
            renderParamsForm(paramsData);
            closeParamEditor();
        }
    </script>
</body>
</html>
