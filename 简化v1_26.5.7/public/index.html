<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福州门店 AI 分析系统</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" class="active">用户工作台</a>
            <a href="monitor.html">后台监控流</a>
            <button class="settings-btn" onclick="openSettings()">
                <i class="fas fa-cog"></i> 设置
            </button>
        </nav>

        <header>
            <h1>药店经营 AI 智能诊断</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">拖入门店经营 JSON 数据，一键获取深度归因与优化策略。</p>
        </header>

        <div class="card">
            <div id="dropZone" class="drop-zone">
                <i class="fas fa-file-upload"></i>
                <p id="fileName">拖放一个或多个 JSON 文件到此处</p>
                <div id="fileList" class="file-list"></div>
                <input type="file" id="fileInput" hidden accept=".json" multiple>
            </div>

            <div style="text-align: center; display: flex; justify-content: center; gap: 1rem;">
                <button id="startBtn" class="btn" disabled>
                    <i class="fas fa-magic"></i> 开始多维 AI 诊断
                </button>
                <button id="stopBtn" class="btn btn-secondary" style="display: none; background: #ef4444; color: white; border-color: #ef4444;">
                    <i class="fas fa-stop-circle"></i> 强制停止
                </button>
            </div>

            <div id="loading" class="loading" style="display: none; justify-content: center; align-items: center; gap: 0.5rem;">
                <div class="spinner" style="width: 20px; height: 20px;"></div>
                <span id="statusText" style="color: #666;">任务正在后台运行，请等待...</span>
            </div>

            <div id="globalLogContainer" style="display: none; max-width: 800px; margin: 20px auto; background: #1e1e1e; color: #a3be8c; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; height: 250px; overflow-y: auto; text-align: left; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
                <div style="color: #88c0d0; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #4c566a; padding-bottom: 5px; display: flex; justify-content: space-between;">
                    <span><i class="fas fa-terminal"></i> 总后台运行日志</span>
                    <a href="monitor.html" target="_blank" style="color: #81a1c1; text-decoration: none; font-weight: normal;"><i class="fas fa-external-link-alt"></i> 详细监控视图</a>
                </div>
                <div id="globalLogContent"></div>
            </div>

            <div style="text-align: center; margin-top: 1rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem;">
                <span id="labelSimple" style="font-size: 0.9rem; color: var(--text-muted); font-weight: bold;">精简</span>
                <label class="switch">
                    <input type="checkbox" id="reportToggle">
                    <span class="slider round"></span>
                </label>
                <span id="labelFull" style="font-size: 0.9rem; color: var(--text-muted);">完整</span>
            </div>



            <div id="result" class="report-section">
                <div class="report-card">
                    <div id="reportContent" class="markdown-body"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal">
            <h2><i class="fas fa-cog"></i> AI 接口设置</h2>
            <div class="form-group">
                <label>API Base URL</label>
                <input type="text" id="settingBaseUrl" placeholder="https://api.openai.com/v1">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="settingApiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="settingModel" placeholder="gpt-4o">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn" onclick="saveSettings()">
                    <i class="fas fa-save"></i> 保存
                </button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fileListDisplay = document.getElementById('fileList');
        const loading = document.getElementById('loading');
        const statusText = document.getElementById('statusText');
        const globalLogContainer = document.getElementById('globalLogContainer');
        const globalLogContent = document.getElementById('globalLogContent');
        const resultSection = document.getElementById('result');
        const reportToggle = document.getElementById('reportToggle');
        const labelSimple = document.getElementById('labelSimple');
        const labelFull = document.getElementById('labelFull');
        
        let jsonFilesData = [];
        let currentReport = null;
        let currentFullReport = null;
        let pollingInterval = null;
        let sseSource = null;

        function connectSSE() {
            if (sseSource) return;
            sseSource = new EventSource('/api/stream');
            sseSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'log') {
                    const div = document.createElement('div');
                    div.style.marginBottom = '2px';
                    div.innerText = `[${data.time}] ${data.message}`;
                    globalLogContent.appendChild(div);
                    globalLogContainer.scrollTop = globalLogContainer.scrollHeight;
                } else if (data.type === 'reset') {
                    globalLogContent.innerHTML = '';
                }
            };
        }

        function disconnectSSE() {
            if (sseSource) {
                sseSource.close();
                sseSource = null;
            }
        }

        window.onload = async () => {
            await checkStatus();
        };

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                if (data.status === 'running') {
                    startBtn.disabled = true;
                    stopBtn.style.display = 'inline-flex';
                    loading.style.display = 'flex';
                    statusText.innerText = '任务正在后台运行，请等待...';
                    globalLogContainer.style.display = 'block';
                    connectSSE();
                    resultSection.classList.remove('visible');
                    
                    if (!pollingInterval) {
                        pollingInterval = setInterval(checkStatus, 2000);
                    }
                } else if (data.status === 'completed') {
                    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
                    disconnectSSE();
                    startBtn.disabled = jsonFilesData.length === 0;
                    stopBtn.style.display = 'none';
                    loading.style.display = 'none';
                    globalLogContainer.style.display = 'none';
                    
                    if (data.result && data.fullResult) {
                        currentReport = data.result;
                        currentFullReport = data.fullResult;
                        renderReport();
                        resultSection.classList.add('visible');
                    }
                } else if (data.status === 'error' || data.status === 'aborted') {
                    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
                    disconnectSSE();
                    startBtn.disabled = jsonFilesData.length === 0;
                    stopBtn.style.display = 'none';
                    loading.style.display = 'none';
                    globalLogContainer.style.display = 'none';
                    
                    if (data.errorMessage && data.errorMessage.length > 0 && currentReport == null) {
                        alert('运行结束: ' + (data.errorMessage || data.status));
                    }
                } else {
                    // idle
                    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
                    disconnectSSE();
                    startBtn.disabled = jsonFilesData.length === 0;
                    stopBtn.style.display = 'none';
                    loading.style.display = 'none';
                    globalLogContainer.style.display = 'none';
                }
            } catch (e) {
                console.error("Status fetch error", e);
            }
        }

        reportToggle.addEventListener('change', () => {
            if (reportToggle.checked) {
                labelSimple.style.fontWeight = 'normal';
                labelFull.style.fontWeight = 'bold';
            } else {
                labelSimple.style.fontWeight = 'bold';
                labelFull.style.fontWeight = 'normal';
            }
            renderReport();
        });

        function renderReport() {
            if (currentReport === null || currentFullReport === null) return;
            
            const isFull = reportToggle.checked;
            const rep = isFull ? currentFullReport : currentReport;
            
            const contentDiv = document.getElementById('reportContent');
            const cardDiv = contentDiv.closest('.report-card');
            
            if (!rep || rep.trim() === '') {
                cardDiv.style.display = 'none';
                return;
            }
            
            cardDiv.style.display = 'block';

            if (isFull) {
                // 完整报告直接用 markdown 渲染
                contentDiv.innerHTML = marked.parse(rep);
                contentDiv.className = 'markdown-body';
            } else {
                // 精简报告（JSON 卡片化）
                try {
                    let jsonStr = rep;
                    if (jsonStr.startsWith('```json')) {
                        jsonStr = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                    } else if (jsonStr.startsWith('```')) {
                        jsonStr = jsonStr.replace(/```/g, '').trim();
                    }
                    
                    const data = JSON.parse(jsonStr);
                    
                    // 构建大卡片（概览）
                    const overviewHtml = `
                        <div class="dashboard-overview">
                            <h2>
                                <i class="fas fa-heartbeat"></i> 经营状态：${data.health_status || '未知'}
                            </h2>
                            <p>${data.overview_text || '暂无概览信息'}</p>
                        </div>
                    `;

                    // 构建小卡片（瀑布流/网格）
                    let cardsHtml = '';
                    if (data.cards && data.cards.length > 0) {
                        const cardsList = data.cards.map(c => {
                            let icon = 'fa-info-circle';
                            let iconColor = 'var(--primary)';
                            if (c.color === 'red') { icon = 'fa-exclamation-triangle'; iconColor = 'var(--error)'; }
                            if (c.color === 'yellow') { icon = 'fa-bolt'; iconColor = '#f59e0b'; }
                            if (c.color === 'green') { icon = 'fa-check-circle'; iconColor = 'var(--success)'; }
                            if (c.color === 'pink') { icon = 'fa-question-circle'; iconColor = '#ff6b9d'; }

                            return `
                                <div class="issue-card" data-color="${c.color || 'blue'}">
                                    <div class="issue-title">
                                        <i class="fas ${icon}" style="color: ${iconColor};"></i>
                                        ${c.title}
                                    </div>
                                    <div class="issue-explanation">${c.explanation}</div>
                                    <div class="issue-suggestion">
                                        <i class="fas fa-lightbulb"></i>
                                        <span>${c.suggestion}</span>
                                    </div>
                                    <div class="evidence-wrapper">
                                        <i class="fas fa-chart-line evidence-icon"></i>
                                        <div class="evidence-tooltip markdown-body">${marked.parse(c.evidence || '')}</div>
                                    </div>
                                </div>
                            `;
                        }).join('');
                        cardsHtml = `<div class="masonry-grid">${cardsList}</div>`;
                    }

                    contentDiv.className = ''; // 移除 markdown-body 样式
                    contentDiv.innerHTML = overviewHtml + cardsHtml;

                } catch (e) {
                    console.error("JSON 解析失败:", e);
                    // 降级处理
                    contentDiv.className = 'markdown-body';
                    contentDiv.innerHTML = `<h3><i class="fas fa-exclamation-triangle" style="color:orange;"></i> 数据解析异常</h3><p>AI 返回的格式不符合预期，以下为原始内容：</p><br>` + marked.parse(rep);
                }
            }
        }

        // === 设置相关 ===
        function loadSettings() {
            return {
                baseUrl: localStorage.getItem('ai_baseUrl') || 'https://api.openai.com/v1',
                apiKey: localStorage.getItem('ai_apiKey') || '',
                model: localStorage.getItem('ai_model') || 'gpt-4o'
            };
        }

        function openSettings() {
            const s = loadSettings();
            document.getElementById('settingBaseUrl').value = s.baseUrl;
            document.getElementById('settingApiKey').value = s.apiKey;
            document.getElementById('settingModel').value = s.model;
            document.getElementById('settingsModal').classList.add('open');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('open');
        }

        function saveSettings() {
            localStorage.setItem('ai_baseUrl', document.getElementById('settingBaseUrl').value.trim());
            localStorage.setItem('ai_apiKey', document.getElementById('settingApiKey').value.trim());
            localStorage.setItem('ai_model', document.getElementById('settingModel').value.trim());
            closeSettings();
        }

        // === 文件上传 ===
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        };

        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        };

        function handleFiles(files) {
            if (files.length === 0) return;
            
            jsonFilesData = [];
            fileListDisplay.innerHTML = '';
            
            Array.from(files).forEach(file => {
                if (!file.name.endsWith('.json')) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        jsonFilesData.push(data);
                        
                        const item = document.createElement('div');
                        item.className = 'file-item';
                        item.innerHTML = `<i class="fas fa-file-code"></i> ${file.name}`;
                        fileListDisplay.appendChild(item);

                        if (jsonFilesData.length > 0) {
                            startBtn.disabled = false;
                            document.getElementById('fileName').innerText = `已准备 ${jsonFilesData.length} 个数据文件`;
                        }
                    } catch (err) {
                        console.error('JSON 解析失败', file.name);
                    }
                };
                reader.readAsText(file);
            });
        }

        // === 开始分析 ===
        startBtn.onclick = async () => {
            if (jsonFilesData.length === 0) return;

            const settings = loadSettings();

            startBtn.disabled = true;
            stopBtn.style.display = 'inline-flex';
            loading.style.display = 'flex';
            globalLogContainer.style.display = 'block';
            connectSSE();
            resultSection.classList.remove('visible');
            statusText.innerText = settings.apiKey
                ? '正在提交分析任务...'
                : '正在使用模拟模式（未配置 API）...';

            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        files: jsonFilesData,
                        settings: settings.apiKey ? settings : null
                    })
                });

                const data = await response.json();
                
                if (data.status === 'started' || data.status === 'success') {
                    if (!pollingInterval) {
                        pollingInterval = setInterval(checkStatus, 2000);
                    }
                } else {
                    throw new Error(data.error || '启动失败');
                }
            } catch (err) {
                alert('分析出错: ' + err.message);
                loading.style.display = 'none';
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
            }
        };

        stopBtn.onclick = async () => {
            if (!confirm('确认要强制停止当前正在运行的后台分析任务吗？')) return;
            try {
                await fetch('/api/stop', { method: 'POST' });
                await checkStatus();
            } catch(e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
