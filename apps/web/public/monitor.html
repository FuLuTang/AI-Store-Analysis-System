<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统后台监控 - AI 分析系统</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <nav>
            <a href="index.html">用户工作台</a>
            <a href="monitor.html" class="active">后台监控流</a>
            <a href="admin.html">管理员配置</a>
            <button class="settings-btn" onclick="localStorage.removeItem('X-FZT-Key'); window.location.href='/login.html';" style="color:#ef4444;">
                <i class="fas fa-sign-out-alt"></i> 退出
            </button>
        </nav>

        <header>
            <h1>后台数据流转监视器</h1>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">实时观察系统处理步骤与日志输出。支持多文件（JSON / Excel / CSV）管线。</p>
        </header>

        <!-- 流程图 -->
        <div class="card" style="margin-bottom: 1.5rem;">
            <div class="flow-container">

                <!-- 数据接入 · 纯算法 -->
                <div class="flow-row">
                    <div class="subgraph" style="flex-direction: column; padding: 1.5rem 1rem;">
                        <div style="font-size: 0.65rem; color: #64748b; position: absolute; top: 4px; width: 100%; text-align: center; font-weight: 600;">数据接入 · 纯算法</div>
                        <div id="input" class="node pending">
                            <div class="node-title"><i class="fas fa-file-import"></i> <span>数据输入</span></div>
                            <div class="node-log" id="log-input"></div>
                        </div>
                        <div class="v-connector"></div>
                        <div id="profile" class="node pending">
                            <div class="node-title"><i class="fas fa-chart-bar"></i> <span>数据画像</span></div>
                            <div class="node-log" id="log-profile"></div>
                        </div>
                    </div>
                </div>

                <!-- 并行分支标识 -->
                <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 0;">
                    <div style="height:2px;flex:1;background:#94a3b8;"></div>
                    <span style="font-size:0.7rem;color:#64748b;font-weight:600;">⬇ 并行 ⬇</span>
                    <div style="height:2px;flex:1;background:#94a3b8;"></div>
                </div>

                <!-- 并行：左边 AI 初诊，右边 语义+指标 -->
                <div style="display:flex;gap:1rem;">
                    <!-- 左侧：AI 初诊 · 并行 -->
                    <div style="flex:1;min-width:0;">
                        <div class="flow-row">
                            <div class="subgraph" style="flex-direction: column; padding: 1.5rem 1rem; border-color: #8b5cf6; background: #faf5ff;">
                                <div style="font-size: 0.65rem; color: #8b5cf6; position: absolute; top: 4px; width: 100%; text-align: center; font-weight: 600;">AI 初诊 · 并行（纯数据结构）</div>
                                <div id="report" class="node pending">
                                    <div class="node-title"><i class="fas fa-robot"></i> <span>AI初诊报告</span></div>
                                    <div class="node-log" id="log-report"></div>
                                </div>
                                <div class="v-connector"></div>
                                <div id="review" class="node pending">
                                    <div class="node-title"><i class="fas fa-search-check"></i> <span>错误评审 (AI)</span></div>
                                    <div class="node-log" id="log-review"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：语义理解 + 标准数据与指标 -->
                    <div style="flex:1;min-width:0;">
                        <div class="flow-row">
                            <div class="subgraph" style="flex-direction: column; padding: 1.5rem 1rem; border-color: #a78bfa; background: #faf5ff;">
                                <div style="font-size: 0.65rem; color: #a78bfa; position: absolute; top: 4px; width: 100%; text-align: center; font-weight: 600;">语义理解 · AI辅助</div>
                                <div id="scene" class="node pending">
                                    <div class="node-title"><i class="fas fa-lightbulb"></i> <span>场景识别 (AI)</span></div>
                                    <div class="node-log" id="log-scene"></div>
                                </div>
                                <div class="v-connector"></div>
                                <div id="mapping" class="node pending">
                                    <div class="node-title"><i class="fas fa-tags"></i> <span>语义映射 (AI)</span></div>
                                    <div class="node-log" id="log-mapping"></div>
                                </div>
                            </div>
                        </div>
                        <div class="v-connector"></div>
                        <div class="flow-row">
                            <div class="subgraph" style="flex-direction: column; padding: 1.5rem 1rem;">
                                <div style="font-size: 0.65rem; color: #64748b; position: absolute; top: 4px; width: 100%; text-align: center; font-weight: 600;">标准数据与指标 · 纯算法</div>
                                <div id="canonical" class="node pending">
                                    <div class="node-title"><i class="fas fa-layer-group"></i> <span>标准数据层</span></div>
                                    <div class="node-log" id="log-canonical"></div>
                                </div>
                                <div class="v-connector"></div>
                                <div id="registry" class="node pending">
                                    <div class="node-title"><i class="fas fa-list-check"></i> <span>指标匹配</span></div>
                                    <div class="node-log" id="log-registry"></div>
                                </div>
                                <div class="v-connector"></div>
                                <div id="engine" class="node pending">
                                    <div class="node-title">
                                        <i class="fas fa-calculator"></i> <span>指标计算</span>
                                        <span id="engine-progress" class="progress-badge" style="display:none;">0/0</span>
                                    </div>
                                    <div class="node-log" id="log-engine"></div>
                                </div>
                                <div class="v-connector"></div>
                                <div id="threshold" class="node pending">
                                    <div class="node-title">
                                        <i class="fas fa-scale-balanced"></i> <span>健康判断</span>
                                        <span id="threshold-tally" class="tally-badges" style="display:none;"></span>
                                    </div>
                                    <div class="node-log" id="log-threshold"></div>
                                </div>
                                <div class="v-connector"></div>
                                <div id="evidence" class="node pending">
                                    <div class="node-title"><i class="fas fa-database"></i> <span>证据包</span></div>
                                    <div class="node-log" id="log-evidence"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 合并分支标识 -->
                <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 0;">
                    <div style="height:2px;flex:1;background:#94a3b8;"></div>
                    <span style="font-size:0.7rem;color:#64748b;font-weight:600;">⬇ 合并 ⬇</span>
                    <div style="height:2px;flex:1;background:#94a3b8;"></div>
                </div>

                <!-- 融合 + 深度报告 · AI -->
                <div class="flow-row">
                    <div class="subgraph" style="flex-direction: column; padding: 1.5rem 1rem; border-color: #8b5cf6; background: #faf5ff;">
                        <div style="font-size: 0.65rem; color: #8b5cf6; position: absolute; top: 4px; width: 100%; text-align: center; font-weight: 600;">报告生成 · AI</div>
                        <div id="fusion" class="node pending">
                            <div class="node-title"><i class="fas fa-object-group"></i> <span>数据融合</span></div>
                            <div class="node-log" id="log-fusion"></div>
                        </div>
                        <div class="v-connector"></div>
                        <div id="rep1" class="node pending">
                            <div class="node-title"><i class="fas fa-file-medical"></i> <span>完整报告 (AI)</span></div>
                            <div class="node-log" id="log-rep1"></div>
                        </div>
                        <div class="v-connector"></div>
                        <div id="rep2" class="node pending">
                            <div class="node-title"><i class="fas fa-file-contract"></i> <span>精简报告 (AI)</span></div>
                            <div class="node-log" id="log-rep2"></div>
                        </div>
                    </div>
                </div>

            </div>
            <div style="margin-top: 0.75rem; color: var(--text-muted); font-size: 0.8rem; display: flex; justify-content: space-between;">
                <span>SSE: <span id="connStatus" style="color: var(--success)">已连接</span></span>
                <span id="currentTime">等待任务...</span>
            </div>
        </div>
    </div>

    <script>
        // ========== 鉴权守卫 ==========
        (async function authGuard() {
            const key = localStorage.getItem('X-FZT-Key');
            if (!key) { window.location.href = '/login.html'; return; }
            try {
                const r = await fetch('/api/auth/verify', { method: 'POST', headers: { 'X-FZT-Key': key } });
                if (!r.ok) { localStorage.removeItem('X-FZT-Key'); window.location.href = '/login.html'; }
            } catch(e) { window.location.href = '/login.html'; }
        })();

        const connStatus = document.getElementById('connStatus');
        const timeDisplay = document.getElementById('currentTime');
        const key = localStorage.getItem('X-FZT-Key') || '';
        const eventSource = new EventSource('/api/stream?x-fzt-key=' + encodeURIComponent(key));

        eventSource.onopen = () => {
            connStatus.innerText = '已连接';
            connStatus.style.color = 'var(--success)';
        };
        eventSource.onerror = () => {
            connStatus.innerText = '断开，重连中...';
            connStatus.style.color = 'var(--error)';
        };

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'status') {
                updateNode(data.nodeId, data.status, data.time);
            } else if (data.type === 'log') {
                appendLog(data.nodeId, data.message, data.time);
            } else if (data.type === 'progress') {
                updateProgress(data.nodeId, data.current, data.total);
            } else if (data.type === 'tally') {
                updateTally(data.nodeId, data.tally);
            } else if (data.type === 'reset') {
                resetAllNodes();
            }
        };

        function resetAllNodes() {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(node => {
                node.className = 'node pending';
                const logEl = node.querySelector('.node-log');
                if (logEl) logEl.innerHTML = '';
            });
            ['engine-progress', 'alg2-progress'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.style.display = 'none'; el.textContent = '0/0'; }
            });
            ['threshold-tally', 'alg3-tally'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.style.display = 'none'; el.innerHTML = ''; }
            });
            timeDisplay.innerText = '等待任务...';
        }

        function updateNode(nodeId, status, time) {
            const node = document.getElementById(nodeId);
            if (node) {
                node.classList.remove('pending', 'active', 'success', 'error', 'simulated', 'uncountable');
                node.classList.add(status);
            }
            if (status === 'pending') {
                const logEl = document.getElementById('log-' + nodeId);
                if (logEl) logEl.innerHTML = '';
                const progEl = document.getElementById(nodeId + '-progress');
                if (progEl) { progEl.style.display = 'none'; progEl.textContent = '0/0'; }
                const tallyEl = document.getElementById(nodeId + '-tally');
                if (tallyEl) { tallyEl.style.display = 'none'; tallyEl.innerHTML = ''; }
            }
            timeDisplay.innerText = '最后更新: ' + time;
        }

        function appendLog(nodeId, message, time) {
            const logEl = document.getElementById('log-' + nodeId);
            if (!logEl) return;
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = '<span class="log-time">' + time + '</span> ' + escapeHtml(message);
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateProgress(nodeId, current, total) {
            const el = document.getElementById(nodeId + '-progress');
            if (!el) return;
            el.style.display = 'inline';
            el.textContent = current + '/' + total;
            if (current === total) {
                el.style.background = 'var(--success)';
            } else {
                el.style.background = 'var(--primary)';
            }
        }

        function updateTally(nodeId, tally) {
            const el = document.getElementById(nodeId + '-tally');
            if (!el) return;
            el.style.display = 'inline-flex';
            el.innerHTML = '<span class="tally-badge pass">🟢' + tally.pass + '</span>'
                + '<span class="tally-badge attention">🟡' + tally.attention + '</span>'
                + '<span class="tally-badge warning">🔴' + tally.warning + '</span>'
                + (tally.uncountable ? '<span class="tally-badge uncountable">⚪' + tally.uncountable + '</span>' : '');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
