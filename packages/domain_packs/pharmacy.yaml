# 药店行业指标包

industry: pharmacy
aliases: [药店, 药房, 药, 药品]

metrics:
  - metric_id: revenue_change
    name: 营收趋势
    required_fields: [date, revenue]
    calculator: period_change
    health_profiles: [default]

  - metric_id: avg_order_value
    name: 客单价
    required_fields: [revenue, order_count]
    calculator: ratio
    params:
      numerator: revenue
      denominator: order_count
    health_profiles: [default]

  - metric_id: gross_margin_rate
    name: 毛利率
    required_fields: [revenue, gross_profit]
    calculator: ratio
    params:
      numerator: gross_profit
      denominator: revenue
      unit: "%"
    health_profiles: [default]

  - metric_id: channel_share
    name: 渠道占比
    required_fields: [revenue, channel]
    calculator: share_by_dimension
    params:
      value_field: revenue
      dim_field: channel
    health_profiles: [default]

  - metric_id: channel_concentration
    name: 渠道集中度
    required_fields: [revenue, channel]
    calculator: concentration
    params:
      value_field: revenue
      dim_field: channel
    health_profiles: [default, o2o_driven]

  - metric_id: member_penetration
    name: 会员渗透率
    required_fields: [member_revenue, revenue]
    calculator: ratio
    params:
      numerator: member_revenue
      denominator: revenue
      unit: "%"
    health_profiles: [default]

  - metric_id: revenue_consecutive
    name: 营收连续涨跌
    required_fields: [date, revenue]
    calculator: consecutive_change
    params:
      field: revenue
    health_profiles: [default]

  - metric_id: customer_change
    name: 客流趋势
    required_fields: [date, customer_count]
    calculator: period_change
    params:
      field: customer_count
    health_profiles: [default]

  - metric_id: gross_margin_trend
    name: 毛利率趋势
    required_fields: [date, revenue, gross_profit]
    calculator: gross_margin_trend
    health_profiles: [default]

  - metric_id: customer_consecutive
    name: 客流连续涨跌
    required_fields: [date, customer_count]
    calculator: consecutive_change
    params:
      field: customer_count
    health_profiles: [default]

  - metric_id: growth_decomposition
    name: 增长拆解
    required_fields: [date, revenue, order_count]
    calculator: growth_decomposition
    health_profiles: [default]

  - metric_id: total_sales_quantity
    name: 总销量
    required_fields: [sales_quantity]
    calculator: sum_field
    params:
      field: sales_quantity
    health_profiles: [default]

  - metric_id: product_diversity
    name: 商品种类
    required_fields: [product_name]
    calculator: distinct_count
    params:
      field: product_name
    health_profiles: [default]

  - metric_id: price_range
    name: 价格带
    required_fields: [retail_price]
    calculator: field_stats
    params:
      field: retail_price
    health_profiles: [default]

  - metric_id: cost_ratio
    name: 成本率
    required_fields: [cost, revenue]
    calculator: ratio
    params:
      numerator: cost
      denominator: revenue
      unit: "%"
    health_profiles: [default]

  - metric_id: member_rate
    name: 会员占比
    required_fields: [member_revenue, revenue]
    calculator: ratio
    params:
      numerator: member_revenue
      denominator: revenue
      unit: "%"
    health_profiles: [default]

  - metric_id: top_product_contribution
    name: TOP商品贡献
    required_fields: [revenue, product_name]
    calculator: top_contribution
    params:
      value_field: revenue
      dim_field: product_name
      top_n: 3
    health_profiles: [default]

  - metric_id: volatility
    name: 波动率
    required_fields: [date, revenue]
    calculator: volatility
    health_profiles: [default]

  - metric_id: data_completeness
    name: 数据完整度
    required_fields: []
    calculator: data_quality
    health_profiles: [default]

threshold_profiles:
  o2o_driven:
    channel_concentration:
      attention: 85
      warning: 95
  offline_driven:
    channel_concentration:
      attention: 50
      warning: 70
