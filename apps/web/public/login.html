<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 门店分析系统 | 门户</title>
    <script src="auth-session.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0b0f19;
            --glass: rgba(22, 28, 45, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 40%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating background glow elements */
        .ambient-glow-1 {
            position: absolute;
            top: 20%;
            left: 15%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: 20%;
            right: 15%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            filter: blur(50px);
            z-index: -1;
            pointer-events: none;
        }

        .container { width: 100%; max-width: 450px; padding: 20px; z-index: 10; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-weight: 700; font-size: 2.2rem; margin-bottom: 8px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 32px; }

        .input-group { text-align: left; margin-bottom: 20px; }

        label { display: block; font-size: 0.85rem; color: #cbd5e1; margin-bottom: 8px; font-weight: 500; }

        input {
            width: 100%; background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 14px 16px; color: white; font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); background: rgba(15, 23, 42, 0.9); }

        .btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.45); filter: brightness(1.1); }

        .divider { margin: 24px 0; display: flex; align-items: center; color: #475569; font-size: 0.8rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #334155; }
        .divider span { padding: 0 12px; }

        .secondary-link { color: #94a3b8; font-size: 0.85rem; text-decoration: none; margin-top: 16px; display: inline-block; cursor: pointer; }
        .secondary-link:hover { color: white; }

        #key-display {
            display: none; background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2); padding: 16px;
            border-radius: 12px; margin-bottom: 20px; word-break: break-all;
            font-family: monospace; color: #10b981; font-size: 0.9rem;
        }

        .loading-spinner {
            display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="container">
        <div class="glass-card">
            <h1 id="title">欢迎回来</h1>
            <p class="subtitle" id="subtitle">请输入账号和密码进入系统</p>

            <div id="login-section">
                <div class="input-group">
                    <label>账号名</label>
                    <input type="text" id="username-input" autocomplete="username" placeholder="例如 store001">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password-input" autocomplete="current-password" placeholder="请输入密码">
                </div>
                <button class="btn" onclick="handleLogin()">进入系统</button>
                <div class="divider"><span>或</span></div>
                <p class="secondary-link" onclick="switchMode('reg')">申请新账户</p>
            </div>

            <div id="reg-section" style="display:none;">
                <div class="input-group">
                    <label>账号名</label>
                    <input type="text" id="reg-username-input" autocomplete="username" placeholder="3-64 位字母、数字、_ 或 -">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="reg-password-input" autocomplete="new-password" placeholder="至少 8 位">
                </div>
                <div id="key-display"></div>
                <button class="btn" id="reg-btn" onclick="handleRegister()">创建账号</button>
                <p class="secondary-link" onclick="switchMode('login')">已有账号，直接登录</p>
            </div>

            <div class="loading-spinner" id="spinner"></div>
        </div>
    </div>

    <script>
        function switchMode(mode) {
            const isReg = mode === 'reg';
            document.getElementById('login-section').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-section').style.display = isReg ? 'block' : 'none';
            document.getElementById('title').innerText = isReg ? '创建账号' : '欢迎回来';
            document.getElementById('subtitle').innerText = isReg ? '设置账号密码后即可开始分析' : '请输入账号和密码进入系统';
        }

        async function handleLogin() {
            const username = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value;
            if (!username || !password) return;
            setLoading(true);
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (r.ok) {
                    const data = await r.json();
                    if (typeof window.persistAuthToken === 'function') {
                        window.persistAuthToken(data.token);
                    } else {
                        sessionStorage.setItem('authToken', data.token);
                    }
                    sessionStorage.setItem('accountName', username);
                    window.location.href = '/';
                } else {
                    const data = await r.json().catch(() => ({}));
                    alert(data.detail || '账号或密码错误');
                }
            } catch (e) { alert('服务器连接失败: ' + e.message); }
            setLoading(false);
        }

        async function handleRegister() {
            const username = document.getElementById('reg-username-input').value.trim();
            const password = document.getElementById('reg-password-input').value;
            if (!username || !password) return;
            setLoading(true);
            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || '注册失败');
                const display = document.getElementById('key-display');
                display.innerText = `账号已创建: ${d.account}`;
                display.style.display = 'block';
                
                const btn = document.getElementById('reg-btn');
                btn.innerText = '进入系统';
                btn.onclick = () => {
                    if (typeof window.persistAuthToken === 'function') {
                        window.persistAuthToken(d.token);
                    } else {
                        sessionStorage.setItem('authToken', d.token);
                    }
                    sessionStorage.setItem('accountName', username);
                    window.location.href = '/';
                };
            } catch (e) { alert('注册失败: ' + e.message); }
            setLoading(false);
        }

        function setLoading(loading) {
            document.getElementById('spinner').style.display = loading ? 'block' : 'none';
            document.querySelectorAll('button').forEach(b => b.disabled = loading);
        }
    </script>
</body>
</html>
