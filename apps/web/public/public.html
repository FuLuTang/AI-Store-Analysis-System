<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析报告预览 - AI 分析系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .public-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 0;
        }
        .public-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        .public-logo {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .public-logo i {
            color: var(--primary);
        }
        .loading-card {
            text-align: center;
            padding: 5rem 2rem !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 350px;
        }
        .loading-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 15px var(--primary)); }
        }
        .loading-card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .loading-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 420px;
        }
    </style>
    <script>
        (function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.classList.add('light-theme');
            }
        })();
    </script>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>
    
    <div class="container public-container">
        <!-- 简易只读顶部导航栏 -->
        <header class="public-header">
            <div class="public-logo">
                <i class="fas fa-chart-pie"></i>
                <span>门店 AI 智能诊断 · 报告预览</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <span id="userKeyDisplay" style="font-size:0.82rem; color:var(--text-muted); font-family:'JetBrains Mono',monospace; user-select:none;"></span>
                <button class="nav-btn" onclick="window.toggleTheme()" id="themeToggleBtn" title="切换主题" style="display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; padding: 0; border-radius: var(--radius-sm);">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <!-- 页面状态卡片区 -->
        <div id="statusSection">
            <div class="card loading-card">
                <div class="spinner" style="width: 45px; height: 45px; border-width: 4px; margin-bottom: 1.5rem;"></div>
                <h2>正在加载诊断报告...</h2>
                <p>系统正在安全地连接服务器获取报告，请稍候。</p>
            </div>
        </div>

        <!-- 报告展现卡片（分析完成后显示） -->
        <div id="reportSection" style="display: none; margin-top: 1.5rem;">
            <!-- 免登录宽下载按钮区 -->
            <div id="downloadCard" class="card" style="padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border); background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(168, 85, 247, 0.02) 100%);">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.25rem;">
                    <div>
                        <h4 style="font-size: 1.05rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--text);"><i class="fas fa-file-archive" style="color: var(--primary); margin-right: 6px;"></i> 诊断产物包已准备就绪</h4>
                        <p style="font-size: 0.82rem; color: var(--text-muted);">本产物包仅包含最终的指标数据表以及结构化运行结果文件 (ZIP格式)。</p>
                    </div>
                    <button id="publicDownloadBtn" class="btn" style="min-width: 200px; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 1.25rem; border-radius: var(--radius-sm); font-size: 0.92rem;">
                        <i class="fas fa-download"></i> 一键下载分析产物
                    </button>
                </div>
            </div>

            <!-- 报告顶栏 -->
            <div class="report-header-bar" id="reportHeaderBar">
                <h3><i class="fas fa-poll-h"></i> 门店经营智能分析诊断报告</h3>
                <div class="report-toggle" id="reportToggleBar" style="margin:0;">
                    <span id="labelSimple">精简</span>
                    <label class="switch">
                        <input type="checkbox" id="reportToggle">
                        <span class="slider round"></span>
                    </label>
                    <span id="labelFull">完整</span>
                </div>
            </div>
            
            <!-- 报告正文 -->
            <div class="report-card">
                <div id="reportContent" class="markdown-body"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== marked 图片渲染自定义 ==========
        const _rewriteImageSrc = function(href) {
            if (href && (href.startsWith('./') || (!href.includes('://') && !href.startsWith('data:')))) {
                const filename = href.replace(/^\.\//, '');
                return `/api/reports/public/${runId}/assets/${encodeURIComponent(filename)}?sign=${encodeURIComponent(sign || '')}`;
            }
            return href;
        };
        marked.use({
            renderer: {
                image(token) {
                    const href = (typeof token === 'object' && token !== null) ? token.href : token;
                    const title = (typeof token === 'object' && token !== null) ? (token.title || '') : (arguments[1] || '');
                    const text = (typeof token === 'object' && token !== null) ? (token.text || '') : (arguments[2] || '');
                    const src = _rewriteImageSrc(href);
                    return `<img src="${src}" alt="${text}" title="${title}" style="max-width:100%; height:auto; display:block; margin:1.5rem auto; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.12); border:1px solid var(--border-color);" />`;
                }
            }
        });

        // ========== 主题切换 ==========
        window.toggleTheme = function() {
            const isDark = document.documentElement.classList.toggle('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        };

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                const isDark = document.documentElement.classList.contains('dark-theme');
                icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
            }
        }
        setTimeout(updateThemeIcon, 0);

        // ========== 数据加载与渲染 ==========
        const urlParams = new URLSearchParams(window.location.search);
        const runId = urlParams.get('run_id');
        const sign = urlParams.get('sign');

        const statusSection = document.getElementById('statusSection');
        const reportSection = document.getElementById('reportSection');
        const reportContent = document.getElementById('reportContent');
        const reportToggle = document.getElementById('reportToggle');
        const labelSimple = document.getElementById('labelSimple');
        const labelFull = document.getElementById('labelFull');
        const downloadBtn = document.getElementById('publicDownloadBtn');

        let currentReport = null;
        let currentFullReport = null;

        async function fetchPublicReport() {
            if (!runId || !sign) {
                renderError('缺少参数', '当前访问的分享链接格式不正确，缺少必要的分析运行凭证。');
                return;
            }

            try {
                const url = `/api/reports/public/status?run_id=${encodeURIComponent(runId)}&sign=${encodeURIComponent(sign)}`;
                const res = await fetch(url);
                if (res.status === 403) {
                    renderError('无权访问', '该诊断报告未公开分享，或分享签名校验未通过。');
                    return;
                }
                if (res.status === 404) {
                    renderError('未找到报告', '服务器上未找到该批次的诊断运行记录。');
                    return;
                }
                if (!res.ok) throw new Error(`请求出错(${res.status})`);
                
                const data = await res.json();
                if (data.userKey) {
                    const disp = document.getElementById('userKeyDisplay');
                    if (disp) disp.innerText = `所属账号: ${data.userKey}`;
                }
                
                if (data.status === 'running' || data.status === 'queued') {
                    // 分析生成中
                    renderGenerating();
                    // 2.5秒后轮询重试
                    setTimeout(fetchPublicReport, 2500);
                } else if (data.status === 'completed') {
                    // 分析已完成，载入并渲染报告
                    currentReport = data.result;
                    currentFullReport = data.fullResult;
                    
                    statusSection.style.display = 'none';
                    reportSection.style.display = 'block';
                    
                    renderReport();
                } else {
                    renderError('报告生成失败', `该批次分析运行失败或已被终止 (任务状态: ${data.status})。`);
                }
            } catch (err) {
                renderError('加载报告失败', '请求后端服务器时发生异常: ' + err.message);
            }
        }

        function renderGenerating() {
            statusSection.innerHTML = `
                <div class="card loading-card">
                    <i class="fas fa-robot loading-icon"></i>
                    <h2>分析报告正在全力生成中...</h2>
                    <p>AI 智能管线正在对该批次的门店经营数据进行深度多维归因及策略拟合，这通常需要 1-3 分钟，请稍候。页面会自动刷新获取结果。</p>
                </div>
            `;
        }

        function renderError(title, desc) {
            statusSection.innerHTML = `
                <div class="card loading-card" style="border: 1px solid rgba(244, 63, 94, 0.2); background: linear-gradient(135deg, rgba(244, 63, 94, 0.05) 0%, transparent 100%);">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--error); margin-bottom: 1.5rem;"></i>
                    <h2 style="color: var(--error);">${title}</h2>
                    <p>${desc}</p>
                </div>
            `;
        }

        reportToggle.addEventListener('change', () => {
            if (reportToggle.checked) {
                labelSimple.style.fontWeight = 'normal';
                labelFull.style.fontWeight = 'bold';
            } else {
                labelSimple.style.fontWeight = 'bold';
                labelFull.style.fontWeight = 'normal';
            }
            renderReport();
        });

        let renderedChartInstances = [];
        function disposeRenderedCharts() {
            renderedChartInstances.forEach((chart) => {
                try { chart.dispose(); } catch (e) {}
            });
            renderedChartInstances = [];
        }

        function renderPriceReport(data) {
            const bestPrice = Number(data.bestPrice);
            const metric = data.bestPriceMetric === 'profit' ? '利润' : '销售额';
            const subtitleText = Number.isFinite(bestPrice)
                ? `${data.productName || '目标商品'} 的最优售价 ${bestPrice.toFixed(2)} 元（按${metric}排序）`
                : `${data.productName || '目标商品'} 的候选价格已生成。`;

            const overviewHtml = `
                <div class="dashboard-overview" style="margin-bottom:1.5rem; border-left-color:var(--success);">
                    <h2>
                        <i class="fas fa-tags" style="color:var(--success);"></i> 最优价格推荐：${Number.isFinite(bestPrice) ? bestPrice.toFixed(2) + ' 元' : '已生成'}
                    </h2>
                    <p>${subtitleText}</p>
                </div>
            `;

            const recommendations = Array.isArray(data.recommendations) ? data.recommendations : [];
            let recsHtml = '';
            if (recommendations.length === 0) {
                recsHtml = '<div class="empty-state">没有生成推算结果。</div>';
            } else {
                const cards = recommendations.map((item) => `
                    <div class="price-card">
                        <div class="price-rank">TOP ${item.rank ?? ''}</div>
                        <div class="price-value">${Number(item.price).toFixed(2)} <span style="font-size:1rem;font-weight:700;color:var(--text-muted);">${item.unit || '元'}</span></div>
                        <div class="badge-row" style="margin-bottom:0.55rem;">
                            <span class="badge completed" style="padding:0.25rem 0.6rem;"><i class="fas fa-bullseye"></i> 置信度 ${(Number(item.confidence) * 100).toFixed(0)}%</span>
                        </div>
                        <div class="price-reason">${item.reason || '暂无解释'}</div>
                    </div>
                `).join('');
                recsHtml = `
                    <h4 style="font-size: 1.1rem; font-weight:600; margin:1.5rem 0 1rem;"><i class="fas fa-list-ol"></i> 售价推荐候选列表</h4>
                    <div class="result-grid">${cards}</div>
                `;
            }

            const evidence = data.evidence || {};
            const range = data.validPriceRange || {};
            const normalizedPoints = Array.isArray(data.normalizedPoints) ? data.normalizedPoints : [];
            const renderedFinalCharts = Array.isArray(data.renderedFinalCharts) ? data.renderedFinalCharts : [];
            
            const metaCard = (label, val) => `<div class="meta-card"><div class="label">${label}</div><div class="value">${val}</div></div>`;
            
            const metaHtml = `
                <h4 style="font-size: 1.1rem; font-weight:600; margin:2rem 0 1rem;"><i class="fas fa-database"></i> 拟合数据源及参数分析</h4>
                <div class="meta-grid">
                    ${metaCard('有效价格区间', `${Number(range.min).toFixed(2)} - ${Number(range.max).toFixed(2)}`)}
                    ${metaCard('命中行数', String(evidence.matchedRows ?? 0))}
                    ${metaCard('观察价格数', String(evidence.observedPriceCount ?? 0))}
                    ${metaCard('归一化点数', String(normalizedPoints.length))}
                    ${metaCard('图表数量', String(renderedFinalCharts.length))}
                    ${metaCard('最优售价', Number.isFinite(bestPrice) ? bestPrice.toFixed(2) : 'N/A')}
                    ${metaCard('价格字段', evidence.priceField || '未识别')}
                    ${metaCard('销量字段', evidence.salesField || '未识别')}
                    ${metaCard('时间字段', evidence.timeField || '未识别')}
                </div>
            `;

            let chartsHtml = '';
            if (renderedFinalCharts.length > 0 || normalizedPoints.length > 0) {
                chartsHtml = `
                    <h4 style="font-size: 1.1rem; font-weight:600; margin:2rem 0 1rem;"><i class="fas fa-chart-area"></i> 价格-销量关系拟合曲线</h4>
                    <div id="renderedCharts" class="chart-grid"></div>
                `;
            }

            reportContent.className = '';
            reportContent.innerHTML = overviewHtml + recsHtml + metaHtml + chartsHtml;

            if (renderedFinalCharts.length > 0 || normalizedPoints.length > 0) {
                if (!window.echarts) {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/echarts@6/dist/echarts.min.js';
                    script.onload = () => {
                        renderRenderedChartsInPublic(renderedFinalCharts, normalizedPoints);
                    };
                    document.head.appendChild(script);
                } else {
                    renderRenderedChartsInPublic(renderedFinalCharts, normalizedPoints);
                }
            }
        }

        function renderRenderedChartsInPublic(charts, normalizedPoints) {
            disposeRenderedCharts();
            const renderedChartsEl = document.getElementById('renderedCharts');
            if (!renderedChartsEl) return;
            const finalCharts = Array.isArray(charts) ? charts : [];
            const fallbackCharts = [];
            if (finalCharts.length === 0 && Array.isArray(normalizedPoints) && normalizedPoints.length > 0) {
                fallbackCharts.push({
                    name: '售价-销售数',
                    xLabel: '售价',
                    yLabel: '销售数',
                    points: normalizedPoints.map((item) => [Number(item.price), Number(item.normalizedQty)]),
                });
            }
            const sourceCharts = finalCharts.length > 0 ? finalCharts : fallbackCharts;

            if (sourceCharts.length === 0) {
                renderedChartsEl.innerHTML = '<div class="empty-state">暂无可渲染的图表。</div>';
                return;
            }

            renderedChartsEl.innerHTML = sourceCharts.map((chart, index) => `
                <div class="chart-card" style="border: 1px solid var(--border); border-radius: var(--radius); background: var(--card-bg); box-shadow: var(--shadow); padding: 1rem;">
                    <div class="chart-card-head" style="display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem;">
                        <div class="chart-card-title" style="color: var(--text); font-size: 0.92rem; font-weight: bold;">${chart.name || `图表 ${index + 1}`}</div>
                        <div class="chart-card-note" style="color: var(--text-muted); font-size: 0.8rem;">${chart.xLabel || 'x'} / ${chart.yLabel || 'y'}</div>
                    </div>
                    <div class="chart-stage" id="renderedChart_${index}" style="width: 100%; height: 320px;"></div>
                </div>
            `).join('');

            sourceCharts.forEach((chart, index) => {
                const el = document.getElementById(`renderedChart_${index}`);
                if (!el || !window.echarts) return;
                const instance = window.echarts.init(el);
                renderedChartInstances.push(instance);
                const points = Array.isArray(chart.points) ? chart.points : [];
                const seriesData = points
                    .map((pair) => [Number(pair?.[0]), Number(pair?.[1])])
                    .filter(([x, y]) => Number.isFinite(x) && Number.isFinite(y))
                    .sort((a, b) => a[0] - b[0]);
                if (seriesData.length === 0) {
                    instance.setOption({
                        title: {
                            text: '暂无数据',
                            left: 'center',
                            top: 'middle',
                            textStyle: { color: '#94a3b8', fontSize: 14, fontWeight: 500 }
                        }
                    });
                    return;
                }

                instance.setOption({
                    animationDuration: 500,
                    grid: { left: 52, right: 24, top: 24, bottom: 46 },
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(15, 23, 42, 0.92)',
                        borderColor: 'rgba(148, 163, 184, 0.25)',
                        textStyle: { color: '#e2e8f0' },
                        formatter(params) {
                            const point = params?.[0];
                            if (!point) return '';
                            const [x, y] = point.data || [];
                            return `${chart.xLabel || 'X'}：${Number(x).toFixed(2)}<br/>${chart.yLabel || 'Y'}：${Number(y).toFixed(2)}`;
                        }
                    },
                    xAxis: {
                        type: 'value',
                        scale: true,
                        name: chart.xLabel || 'x',
                        nameTextStyle: { color: '#94a3b8' },
                        axisLabel: { color: '#94a3b8', formatter: (value) => Number(value).toFixed(2) },
                        splitLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.12)' } }
                    },
                    yAxis: {
                        type: 'value',
                        name: chart.yLabel || 'y',
                        nameTextStyle: { color: '#94a3b8' },
                        axisLabel: { color: '#94a3b8' },
                        splitLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.12)' } }
                    },
                    series: [
                        {
                            type: 'line',
                            smooth: true,
                            symbol: 'circle',
                            symbolSize: 8,
                            data: seriesData,
                            lineStyle: { width: 3, color: '#38bdf8' },
                            itemStyle: { color: '#0ea5e9', borderColor: '#e0f2fe', borderWidth: 1.5 },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0,
                                    y: 0,
                                    x2: 0,
                                    y2: 1,
                                    colorStops: [
                                        { offset: 0, color: 'rgba(56, 189, 248, 0.28)' },
                                        { offset: 1, color: 'rgba(56, 189, 248, 0.03)' }
                                    ]
                                }
                            }
                        }
                    ]
                });
            });
        }

        function renderDiagnosisReport(data) {
            const overviewHtml = `
                <div class="dashboard-overview">
                    <h2>
                        <i class="fas fa-heartbeat"></i> 经营状态：${data.health_status || '未知'}
                    </h2>
                    <p>${data.overview_text || '暂无概览信息'}</p>
                </div>
            `;

            let cardsHtml = '';
            if (data.cards && data.cards.length > 0) {
                const cardsList = data.cards.map(c => {
                    let icon = 'fa-info-circle';
                    let iconColor = 'var(--primary)';
                    if (c.color === 'red') { icon = 'fa-exclamation-triangle'; iconColor = 'var(--error)'; }
                    if (c.color === 'yellow') { icon = 'fa-bolt'; iconColor = 'var(--warning)'; }
                    if (c.color === 'green') { icon = 'fa-check-circle'; iconColor = 'var(--success)'; }
                    if (c.color === 'pink') { icon = 'fa-question-circle'; iconColor = '#ff6b9d'; }

                    const evidenceHtml = c.evidence ? `
                        <div class="evidence-wrapper">
                            <i class="fas fa-chart-line evidence-icon"></i>
                            <div class="evidence-tooltip markdown-body">${marked.parse(c.evidence || '')}</div>
                        </div>
                    ` : '';

                    return `
                        <div class="issue-card" data-color="${c.color || 'blue'}">
                            <div class="issue-title">
                                <i class="fas ${icon}" style="color: ${iconColor};"></i>
                                <span>${c.title}</span>
                            </div>
                            <div class="issue-explanation">${c.explanation}</div>
                            <div class="issue-suggestion">
                                <i class="fas fa-lightbulb"></i>
                                <span>${c.suggestion}</span>
                            </div>
                            ${evidenceHtml}
                        </div>
                    `;
                }).join('');
                cardsHtml = `<div class="masonry-grid">${cardsList}</div>`;
            }

            reportContent.className = '';
            reportContent.innerHTML = overviewHtml + cardsHtml;
        }

        function renderReport() {
            if (currentReport === null || currentFullReport === null) return;
            const isFull = reportToggle.checked;
            const rep = isFull ? currentFullReport : currentReport;
            const cardDiv = reportContent.closest('.report-card');
            
            if (!rep || (typeof rep === 'string' && rep.trim() === '')) {
                cardDiv.style.display = 'none';
                return;
            }
            cardDiv.style.display = 'block';

            // Check task type based on currentReport (simplified report)
            let isPriceTask = false;
            try {
                let checkData = null;
                if (typeof currentReport === 'object' && currentReport !== null) {
                    checkData = currentReport;
                } else if (typeof currentReport === 'string') {
                    let jsonStr = currentReport.trim();
                    if (jsonStr.startsWith('```json')) {
                        jsonStr = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                    } else if (jsonStr.startsWith('```')) {
                        jsonStr = jsonStr.replace(/```/g, '').trim();
                    }
                    checkData = JSON.parse(jsonStr);
                }
                if (checkData && (checkData.recommendations !== undefined || checkData.bestPrice !== undefined)) {
                    isPriceTask = true;
                }
            } catch (e) {
                console.error("解析 checkData 失败:", e);
            }

            const downloadCard = document.getElementById('downloadCard');
            if (downloadCard) {
                downloadCard.style.display = isPriceTask ? 'none' : 'block';
            }

            const logoSpan = document.querySelector('.public-logo span');
            const headerH3 = document.querySelector('#reportHeaderBar h3');
            if (isPriceTask) {
                if (logoSpan) logoSpan.innerText = '门店 AI 价格推荐 · 报告预览';
                if (headerH3) headerH3.innerHTML = '<i class="fas fa-tags"></i> 门店商品最优售价推荐报告';
            } else {
                if (logoSpan) logoSpan.innerText = '门店 AI 智能诊断 · 报告预览';
                if (headerH3) headerH3.innerHTML = '<i class="fas fa-poll-h"></i> 门店经营智能分析诊断报告';
            }

            if (isFull) {
                disposeRenderedCharts();
                reportContent.innerHTML = marked.parse(rep);
                reportContent.className = 'markdown-body';
            } else {
                try {
                    let data = null;
                    if (typeof rep === 'object' && rep !== null) {
                        data = rep;
                    } else if (typeof rep === 'string') {
                        let jsonStr = rep.trim();
                        if (jsonStr.startsWith('```json')) {
                            jsonStr = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                        } else if (jsonStr.startsWith('```')) {
                            jsonStr = jsonStr.replace(/```/g, '').trim();
                        }
                        data = JSON.parse(jsonStr);
                    }
                    
                    if (isPriceTask) {
                        renderPriceReport(data);
                    } else {
                        disposeRenderedCharts();
                        renderDiagnosisReport(data);
                    }
                } catch (e) {
                    console.error("JSON 解析失败:", e);
                    disposeRenderedCharts();
                    reportContent.className = 'markdown-body';
                    reportContent.innerHTML = `<h3><i class="fas fa-exclamation-triangle" style="color:orange;"></i> 数据解析异常</h3><p>AI 返回格式与预期不符，以下为原始内容：</p><br>` + marked.parse(typeof rep === 'object' ? JSON.stringify(rep, null, 2) : rep);
                }
            }
        }

        window.addEventListener('resize', () => {
            renderedChartInstances.forEach((chart) => {
                try { chart.resize(); } catch(e) {}
            });
        });

        // ========== 下载事件 ==========
        downloadBtn.onclick = () => {
            if (!runId || !sign) return;
            const url = `/api/reports/public/download?run_id=${encodeURIComponent(runId)}&sign=${encodeURIComponent(sign)}`;
            window.open(url, '_blank');
        };

        window.onload = () => {
            updateThemeIcon();
            fetchPublicReport();
        };
    </script>
</body>
</html>
